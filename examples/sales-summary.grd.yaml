version: "0.1"

report:
  id: sales-summary
  name: Sales Summary Report
  description: Monthly sales summary grouped by branch.

datasource:
  type: table
  table: sales

filters:
  - name: start_date
    type: date
    required: true
  - name: end_date
    type: date
    required: true
  - name: branch_id
    type: string
    required: false

columns:
  - name: invoice_no
    label: Invoice No
    type: string
  - name: invoice_date
    label: Invoice Date
    type: date
  - name: customer_name
    label: Customer
    type: string
  - name: total_amount
    label: Total Amount
    type: number

grouping:
  - branch_id

summary:
  - field: total_amount
    function: sum
    label: Total Sales

sorting:
  - field: invoice_date
    direction: asc

exports:
  - html
  - csv
  - excel
  - pdf

